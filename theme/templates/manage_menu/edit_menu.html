{% extends 'admin_base.html' %}
{% load i18n %}

{% block main %}
<div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-lg mt-8 md:mt-12">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">แก้ไขเมนู: {{ menu.name }}</h1>

    <form method="POST" enctype="multipart/form-data" 
        class="flex flex-col gap-6
                [&_input:not([type=checkbox]):not([type=file])]:w-full [&_input:not([type=checkbox]):not([type=file])]:p-3 [&_input:not([type=checkbox]):not([type=file])]:border [&_input:not([type=checkbox]):not([type=file])]:border-gray-300 [&_input:not([type=checkbox]):not([type=file])]:rounded-xl [&_input:not([type=checkbox]):not([type=file])]:shadow-inner [&_input:not([type=checkbox]):not([type=file])]:focus:ring-2 [&_input:not([type=checkbox]):not([type=file])]:focus:ring-green-500 [&_input:not([type=checkbox]):not([type=file])]:outline-none [&_input:not([type=checkbox]):not([type=file])]:transition-all
                
                [&_textarea]:w-full [&_textarea]:p-3 [&_textarea]:border [&_textarea]:border-gray-300 [&_textarea]:rounded-xl [&_textarea]:shadow-inner [&_textarea]:min-h-[120px] [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-green-500 [&_textarea]:outline-none [&_textarea]:transition-all
                
                [&_input[type=file]]:w-full [&_input[type=file]]:text-gray-600 [&_input[type=file]]:file:mr-4 [&_input[type=file]]:file:py-2 [&_input[type=file]]:file:px-4 [&_input[type=file]]:file:rounded-md [&_input[type=file]]:file:border-0 [&_input[type=file]]:file:text-sm [&_input[type=file]]:file:font-semibold [&_input[type=file]]:file:bg-green-50 [&_input[type=file]]:file:text-green-700 hover:[&_input[type=file]]:file:bg-green-100">
        
        {% csrf_token %}
        
        <div>
            <label for="id_name" class="font-bold text-gray-700 block mb-2">Name:</label>
            {{ form.name }}
        </div>
        
        <div>
            <label for="id_description" class="font-bold text-gray-700 block mb-2">Description:</label>
            {{ form.description }}
        </div>
        
        <div>
            <label for="id_price" class="font-bold text-gray-700 block mb-2">Price:</label>
            {{ form.price }}
        </div>
        
        <div>
            <label for="id_image" class="font-bold text-gray-700 block mb-2">Image:</label>
            <!-- Django มักจะแสดงลิงก์ไฟล์เดิมในส่วนนี้ โค้ดนี้จะรองรับการแสดงผลนั้นด้วย -->
            {{ form.image }}
        </div>
        
        <div class="flex items-center gap-3 mt-2">
            <div class="[&_input[type=checkbox]]:w-6 [&_input[type=checkbox]]:h-6 [&_input[type=checkbox]]:accent-green-600 [&_input[type=checkbox]]:cursor-pointer flex items-center">
                {{ form.is_available }}
            </div>
            <label for="id_is_available" class="font-bold text-gray-700 cursor-pointer text-lg">Available</label>
        </div>
        
        <!-- เพิ่มปุ่มยกเลิกเพื่อให้แอดมินเปลี่ยนใจกลับไปหน้าเดิมได้ง่ายขึ้น -->
        <div class="flex flex-col md:flex-row gap-4 mt-4">
            <a href="{% url 'manage_menu' %}" class="w-full md:w-1/3 text-center bg-gray-500 text-white text-lg font-bold py-3 px-6 rounded-xl hover:bg-gray-600 transition-all duration-200 shadow-md">
                ยกเลิก
            </a>
            <button type="submit" class="w-full md:w-2/3 bg-green-600 text-white text-lg font-bold py-3 px-6 rounded-xl hover:bg-green-700 hover:scale-[1.02] transition-all duration-200 shadow-md">
                บันทึกการเปลี่ยนแปลง
            </button>
        </div>
    </form>
</div>
{% endblock %}
