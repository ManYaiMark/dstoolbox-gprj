<h1>Update Order Status</h1>
<form method="POST">
    {% csrf_token %}
    <label for="status">Status:</label>
    <select name="status">
        {% for status, status_display in order.STATUS_CHOICES %}
            <option value="{{ status }}" {% if status == order.status_order %}selected{% endif %}>{{ status_display }}</option>
        {% endfor %}
    </select>
    <button type="submit">Update</button>
</form>

<a href="{% url 'orders' %}">Back to Order List</a>
