<form method="POST">
    {% csrf_token %}
    <label for="total_price">Total Price:</label>
    <input type="number" name="total_price" value="{{ order.total_price }}" required>

    <label for="status">Status:</label>
    <select name="status">
        {% for status, status_display in order.STATUS_CHOICES %}
            <option value="{{ status }}" {% if status == order.status_order %}selected{% endif %}>{{ status_display }}</option>
        {% endfor %}
    </select>

    <button type="submit">Update Order</button>
</form>
