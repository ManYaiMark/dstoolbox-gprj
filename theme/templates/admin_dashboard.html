{% extends 'admin_base.html' %}

{% block main %}
<!-- admin_dashboard.html -->

<div class="container mx-auto py-6">
    <!-- Bar Chart -->
    <div class="w-full mb-6">
        <h2 class="text-2xl font-bold mb-4">เมนูที่ขายดีที่สุดของวันนี้</h2>
        <div class="relative">
            <img src="{{ top_menus_today_img }}" alt="Bar Chart" class="w-full h-auto rounded-lg shadow-md">
        </div>
    </div>

    <!-- Line Chart -->
    <div class="flex space-x-6 mb-6">
        <div class="w-3/5">
            <h2 class="text-2xl font-bold mb-4">ยอดขายตามช่วงเวลาของวัน</h2>
            <div class="relative">
                <img src="{{ sales_by_hour_img }}" alt="Pie Chart" class="w-full h-auto rounded-lg shadow-md">
            </div>
        </div>

        <!-- Pie Chart -->
        <div class="w-2/5">
            <h2 class="text-2xl font-bold mb-4">ลูกค้าทั่วไป/สมาชิกมาสั่งอาหาร</h2>
            <div class="relative">
                <img src="{{ roles_pie_chart_img }}" alt="Line Chart" class="w-full h-auto rounded-lg shadow-md">
            </div>
        </div>
    </div>
</div>

{% endblock %}
