{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
    {% tailwind_css %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<script src="https://cdn.tailwindcss.com"></script>
    <!-- นำ Bootstrap ออกแล้ว -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-[#f8f9fa] m-0 p-0 font-['Kanit',_sans-serif]">

    <!-- Menu Icon (Mobile Only) -->
    <i class="fas fa-bars absolute top-4 left-4 text-2xl cursor-pointer text-[#222] md:hidden z-40" onclick="toggleSidebar()"></i>

    <!-- Sidebar -->
    <!-- ซ่อนอยู่นอกจอซ้ายมือบนมือถือ (-translate-x-full) และแสดงผลปกติบนจอใหญ่ (md:translate-x-0) -->
    <div id="sidebar" class="fixed inset-y-0 left-0 w-[250px] bg-[#222] text-white pt-5 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-50">
        
        <!-- Close Icon inside Sidebar (Mobile Only) -->
        <div class="text-right pr-4 mb-2 md:hidden">
            <i class="fas fa-times text-2xl cursor-pointer" onclick="toggleSidebar()"></i>
        </div>
        
        <h2 class="text-[#5cb85c] text-center text-2xl font-bold mb-6 leading-tight">น้องอุ้ม<br>อาหารตามสั่ง</h2>

        <!-- เปลี่ยนการจัดการ margin ของไอคอนมาใช้ Grid/Flex เพื่อให้ไอคอนตรงกันทุกบรรทัด -->
        <a href="{% url 'dashboard' %}" class="flex items-center text-white px-5 py-3 text-lg transition-colors duration-300 hover:bg-[#5cb85c]">
            <i class="fas fa-chart-line w-6 text-center"></i> <span class="ml-2">รายงานยอดการขาย</span>
        </a>
        <a href="{% url 'manage_menu' %}" class="flex items-center text-white px-5 py-3 text-lg transition-colors duration-300 hover:bg-[#5cb85c]">
            <i class="fas fa-utensils w-6 text-center"></i> <span class="ml-2">เมนู</span>
        </a>
        <a href="{% url 'orders' %}" class="flex items-center text-white px-5 py-3 text-lg transition-colors duration-300 hover:bg-[#5cb85c]">
            <i class="fas fa-receipt w-6 text-center"></i> <span class="ml-2">ออเดอร์</span>
        </a>
        <a href="{% url 'reward' %}" class="flex items-center text-white px-5 py-3 text-lg transition-colors duration-300 hover:bg-[#5cb85c]">
            <i class="fas fa-gift w-6 text-center"></i> <span class="ml-2">ระบบสะสมแต้ม</span>
        </a>
    </div>

    <!-- Main Content -->
    <!-- ขยับหนี Sidebar บนจอใหญ่ (md:ml-[250px]) -->
    <div id="content" class="w-full md:w-[calc(100%-250px)] md:ml-[250px] min-h-screen flex justify-center items-center p-5 transition-all duration-300">
        <div class="w-full max-w-[1200px] h-auto bg-white rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.1)] p-5 mt-10 md:mt-0 min-h-[90vh] md:min-h-0">
            {% block main %}
            {% endblock %}
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            // สลับคลาส -translate-x-full เพื่อดึง Sidebar เข้า/ออก จากจอในโหมดมือถือ
            sidebar.classList.toggle("-translate-x-full");
        }
    </script>

</body>

</html>
