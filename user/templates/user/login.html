<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-blue-100">

<div class="w-full max-w-md p-8 space-y-6 bg-white shadow-lg rounded-xl border border-blue-200">
    <h2 class="text-3xl font-bold text-center text-blue-700">เข้าสู่ระบบ</h2>

    {% if error %}
    <div class="p-3 mb-4 text-sm text-red-600 bg-red-100 border border-red-400 rounded-lg">
        {{ error }}
    </div>
{% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="username" class="block text-sm font-medium text-blue-700">ชื่อผู้ใช้</label>
            <input type="text" name="username" id="username" 
                   class="w-full p-3 mt-1 border rounded-lg bg-blue-100 focus:ring focus:ring-blue-300" 
                   placeholder="Username" required>
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-blue-700">รหัสผ่าน</label>
            <input type="password" name="password" id="password" 
                   class="w-full p-3 mt-1 border rounded-lg bg-blue-100 focus:ring focus:ring-blue-300" 
                   placeholder="Password" required>
        </div>

        <button type="submit" 
                class="w-full px-4 py-2 font-semibold text-white bg-blue-400 rounded-lg shadow-md hover:bg-blue-500 transition duration-300">
            เข้าสู่ระบบ
        </button>
    </form>

    <div class="text-center">
        <p class="text-sm text-blue-600">
            ยังไม่มีบัญชี? 
            <a href="{% url 'register' %}" class="text-blue-500 font-semibold hover:underline">สมัครสมาชิก</a>
        </p>
    </div>
</div>

</body>
</html>
