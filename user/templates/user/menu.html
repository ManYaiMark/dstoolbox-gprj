{% extends 'user/base.html' %}
{% load static %}

{% block title %}เมนูอาหาร{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/menu.css' %}">

<div class="container mx-auto p-4">
    <h2 class="text-2xl font-bold mb-4">เมนูอาหาร</h2>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        {% for menu in menus %}
            <div class="menu-item p-4 bg-white shadow-md rounded-lg">
              <div>Test</div>
                <img src="{{ menu.image }}" alt="{{ menu.name }}" class="w-full h-32 object-cover rounded">
                <h3 class="text-lg font-semibold mt-2">{{ menu.name }}</h3>
                <p class="text-gray-600 text-sm">{{ menu.description }}</p>
                <p class="font-bold text-blue-500 mt-2">฿{{ menu.price }}</p>
                <form method="POST" action="{% url 'add_to_cart' menu.id %}" class="mt-2">
                    {% csrf_token %}
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                        เพิ่มลงตะกร้า
                    </button>
                </form>
            </div>
        {% endfor %}
    </div>
    <a href="{% url 'order_detail' order_id=1 %}" class="fixed bottom-4 right-4 bg-blue-500 text-white px-4 py-2 rounded-lg shadow-lg flex items-center">
        <span class="mr-2">ดูออเดอร์</span>
        🛒
    </a>
</div>
{% endblock %}
