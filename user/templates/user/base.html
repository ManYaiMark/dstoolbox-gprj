<!DOCTYPE html>
<html lang="th">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ระบบสั่งอาหาร{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><a href="{% url 'menu' %}">🍽 ระบบสั่งอาหาร</a></h1>
            <nav>
                <ul class="flex space-x-4">
                    <li><a href="{% url 'menu' %}" class="hover:underline">เมนู</a></li>
                    <li><a href="{% url 'order_detail' order_id=1 %}" class="hover:underline">ออเดอร์ของฉัน</a></li>
                    {% if user.is_authenticated %}
                        <li><a href="{% url 'logout' %}" class="hover:underline">ออกจากระบบ</a></li>
                    {% else %}
                        <li><a href="{% url 'login' %}" class="hover:underline">เข้าสู่ระบบ</a></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4">
        {% block content %}
        {% endblock %}
    </main>


</body>
</html>
