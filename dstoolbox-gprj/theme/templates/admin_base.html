{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
	{% tailwind_css %}
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Dashboard</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
		rel="stylesheet">
	<style>
		* {
			font-family: "Kanit", serif;
			font-optical-sizing: auto;
			font-style: normal;
		}

		body {
			background-color: #f8f9fa;
		}

		.sidebar {
			width: 250px;
			height: 100vh;
			background: #222;
			color: #fff;
			padding: 20px;
			position: fixed;
		}

		.sidebar h2 {
			color: #5cb85c;
		}

		.sidebar a {
			color: #fff;
			display: block;
			padding: 10px;
			text-decoration: none;
			margin: 5px 0;
		}

		.sidebar a:hover {
			background: #5cb85c;
		}

		.content {
			margin-left: 260px;
			padding: 20px;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.main-box {
			width: 100%;
			height: 95vh;
			background: #fff;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			display: flex;
			justify-content: center;
			align-items: center;
		}
	</style>
</head>

<body>
	<div class="sidebar">
		<h2>ชื่อร้าน</h2>
		<a href="#"><i class="fas fa-chart-line"></i> <span style="margin-left: 10px;">รายงานยอดการขาย</span></a>
		<a href="#"><i class="fas fa-utensils"></i> <span style="margin-left: 15px;">เมนู</span></a>
		<a href="#"><i class="fas fa-receipt"></i> <span style="margin-left: 15px;">ออเดอร์</span></a>
		<a href="#"><i class="fas fa-gift"></i> <span style="margin-left: 10px;">ระบบสะสมแต้ม</span></a>
	</div>
	<div class="content">
		<div class="main-box">
			{% block main %}
			{% endblock %}
		</div>
	</div>
</body>

</html>
