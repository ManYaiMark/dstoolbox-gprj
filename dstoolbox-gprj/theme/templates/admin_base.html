{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
	{% tailwind_css %}
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Dashboard</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
	<style>
		* {
			font-family: "Kanit", sans-serif;
		}

		body {
			background-color: #f8f9fa;
			margin: 0;
			padding: 0;
		}

		/* Sidebar (always visible on PC) */
		.sidebar {
			width: 250px;
			height: 100vh;
			background: #222;
			color: #fff;
			position: fixed;
			top: 0;
			left: 0;
			transition: left 0.3s ease-in-out;
			padding-top: 20px;
		}

		.sidebar h2 {
			color: #5cb85c;
			text-align: center;
		}

		.sidebar a {
			color: #fff;
			display: block;
			padding: 12px 20px;
			text-decoration: none;
			font-size: 18px;
			transition: background 0.3s;
		}

		.sidebar a:hover {
			background: #5cb85c;
		}

		/* Hide sidebar on mobile by default */
		@media (max-width: 768px) {
			.sidebar {
				left: -250px;
				position: fixed;
				width: 250px;
				height: 100vh;
				transition: left 0.3s ease-in-out;
				z-index: 1000;
			}

			.sidebar.active {
				left: 0;
			}
		}

		/* Close Icon inside Sidebar */
		.close-btn {
			font-size: 24px;
			cursor: pointer;
			text-align: right;
			padding-right: 15px;
			display: none;
		}

		@media (max-width: 768px) {
			.close-btn {
				display: block;
			}
		}

		/* Menu Icon (for mobile) */
		.menu-icon {
			font-size: 24px;
			cursor: pointer;
			position: absolute;
			top: 15px;
			left: 15px;
			z-index: 1001;
			color: #222;
			display: none;
		}

		@media (max-width: 768px) {
			.menu-icon {
				display: block;
			}
		}

		/* Content */
		.content {
			margin-left: 250px;
			width: calc(100% - 250px);
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
			transition: margin-left 0.3s ease-in-out;
		}

		/* When sidebar is collapsed on mobile */
		@media (max-width: 768px) {
			.content {
				margin-left: 0;
				width: 100%;
			}
		}

		.main-box {
			width: 100%;
			max-width: 1200px;
			height: 95vh;
			background: #fff;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			padding: 20px;
		}

		@media (max-width: 768px) {
			.main-box {
				margin-top: 35px;
				height: 90vh;
			}
		}
	</style>
</head>

<body>

	<!-- Menu Icon (Mobile Only) -->
	<i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>

	<!-- Sidebar -->
	<div class="sidebar" id="sidebar">
		<div class="close-btn">
			<i class="fas fa-times" onclick="toggleSidebar()"></i>
		</div>
		<h2>ชื่อร้าน</h2>
		<a href="#"><i class="fas fa-chart-line"></i> <span style="margin-left: 10px;">รายงานยอดการขาย</span></a>
		<a href="#"><i class="fas fa-utensils"></i> <span style="margin-left: 15px;">เมนู</span></a>
		<a href="#"><i class="fas fa-receipt"></i> <span style="margin-left: 15px;">ออเดอร์</span></a>
		<a href="#"><i class="fas fa-gift"></i> <span style="margin-left: 10px;">ระบบสะสมแต้ม</span></a>
	</div>

	<!-- Main Content -->
	<div class="content" id="content">
		<div class="main-box">
			{% block main %}
			{% endblock %}
		</div>
	</div>

	<script>
		function toggleSidebar() {
			const sidebar = document.getElementById("sidebar");
			sidebar.classList.toggle("active");
		}
	</script>

</body>

</html>
